<!--
  ROVER · Universal case study embed snippet
  ===========================================
  Paste the block below into Wix:
    Add (+) → Embed Code → Embed HTML → "Custom Code"

  Per Wix page, change the value of data-rover-case to choose which case.
  Currently available slugs: navy, biocotech
  (Add new slugs by editing embed.js in the rover-navy repo.)

  The script auto-resizes the iframe to match the case study's content
  height, so you don't need to set a fixed pixel height on the Wix element.
-->


<!-- ─────────────────────────────────────────────────────────────────
     RECOMMENDED · Universal embed (one snippet, any case)
     Change "navy" to "biocotech" (or any future slug) per Wix page.
     ───────────────────────────────────────────────────────────────── -->

<div data-rover-case="navy"></div>
<script src="https://roverlabmx.github.io/rover-navy/embed.js"></script>


<!-- ─────────────────────────────────────────────────────────────────
     FALLBACK · Direct iframe (no script tier)
     Use if your Wix tier blocks custom <script>.
     Change the src URL per page to switch cases.
     Available URLs:
       https://roverlabmx.github.io/rover-navy/rover_case_study_navy.html
       https://roverlabmx.github.io/rover-navy/rover_case_study_biocotech.html
     ───────────────────────────────────────────────────────────────── -->
